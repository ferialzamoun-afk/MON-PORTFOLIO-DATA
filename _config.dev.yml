# Local-only Jekyll overrides to speed up development builds.
# Keep publication behavior in _config.yml unchanged.

exclude:
  - _site/
  - .venv/
  - venv/
  - streamlit_app/
  - .vscode/
  - node_modules/
  - "**/__pycache__/"
  - "**/.ipynb_checkpoints/"
  - "projets/**/notebooks/"
  - "projets/**/output/"
  - "projets/**/pbit/"
  - "projets/**/Dashboard/"
  - "projets/**/*.ipynb"

incremental: true
livereload: true
